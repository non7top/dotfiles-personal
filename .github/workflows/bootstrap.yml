name: Bootstrap

on:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Run bootstrap
        run: bash bootstrap.sh

      - name: Symlink manifests
        run: |
          ln -sf "$GITHUB_WORKSPACE/_pipx-tools" ~/.pipx-tools
          ln -sf "$GITHUB_WORKSPACE/_npm-global-tools" ~/.npm-global-tools
          ln -sf "$GITHUB_WORKSPACE/_tool-versions" ~/.tool-versions
          ln -sf "$GITHUB_WORKSPACE/_pipx-ignore" ~/.pipx-ignore
          ln -sf "$GITHUB_WORKSPACE/_npm-ignore" ~/.npm-ignore

      - name: Check tool manifests
        run: |
          export PATH="$HOME/.local/bin:$HOME/.asdf/shims:$PATH"
          bash _bin/check-tools

      - name: Install vim
        run: sudo apt-get install -y vim

      - name: Symlink vim config
        run: |
          ln -sf "$GITHUB_WORKSPACE/_vimrc" ~/.vimrc
          ln -sf "$GITHUB_WORKSPACE/_vim" ~/.vim

      - name: Install vim plugins via VAM
        run: vim --headless -c 'qall' 2>&1 || true

      - name: Verify vim plugins
        run: |
          PLUGIN_DIR="$GITHUB_WORKSPACE/_vim/vim-addons"
          FAILED=0
          while IFS= read -r line; do
            plugin=$(echo "$line" | sed 's/VAMActivate github://')
            dir="${PLUGIN_DIR}/github-$(echo "$plugin" | sed 's|/|-|g')"
            if [ -d "$dir" ]; then
              echo "✓ $plugin"
            else
              echo "✗ $plugin (not found at $dir)"
              FAILED=1
            fi
          done < <(grep '^VAMActivate github:' "$GITHUB_WORKSPACE/_vimrc")
          exit $FAILED
